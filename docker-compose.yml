services:
  postgres:
    image: postgres:17
    container_name: ecocycle_postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ecocycle
      POSTGRES_USER: ecocycle_user
      POSTGRES_PASSWORD: ecocycle_password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecocycle_user -d ecocycle"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: